{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>
        
        <!-- Minha CSS -->
        <link rel="stylesheet" href="{% static '/styles/style_bom_sucesso.css' %}">
        
        <!-- Fonte google -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <!-- Fonte do h1 -->
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,500;1,600&family=Montserrat&display=swap" rel="stylesheet">
        
        <!-- Logo e Título -->
        <link rel="shortcut icon" href="{% static '/assets/images/Logo-500x500.ico' %}" type="image/x-icon">
        <title>Sorteio Novo</title>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: '#3B82F6',
                            secondary: '#1E40AF',
                            accent: '#60A5FA',
                        },
                        fontFamily: {
                            'kanit': ['Kanit', 'sans-serif'],
                            'montserrat': ['Montserrat', 'sans-serif'],
                        },
                    }
                }
            }
        </script>
    </head>
    
    <body class="bg-[#5E17EB] min-h-screen flex flex-col">
        {% include 'sorteio_novo/partials/_menu_tailwind.html' %}
        
        <main class="flex-grow">
            {% block content %}{% endblock %}
        </main>

        {% include 'sorteio_novo/partials/_footer_tailwind.html' %}
        
        <!-- Javascript-->
        <script src="{% static '/js/app.js' %}"></script>
    </body>
</html>
