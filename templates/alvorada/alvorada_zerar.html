{% extends 'sorteio_novo/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">Zerar Sorteio - Condomínio Alvorada</h1>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Confirmar Zerar Sorteio</h5>
                    <p class="card-text">Tem certeza que deseja zerar o sorteio? Esta ação não pode ser desfeita.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Confirmar Zerar Sorteio</button>
                        <a href="{% url 'alvorada_sorteio' %}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
