{% extends 'sorteio_novo/base_tailwind.html' %}
{% load static %}

{% block content %}
<div class="max-w-4xl mx-auto mt-[100px]">
  
    <div class="bg-white rounded-lg shadow-lg p-6">
        <div class="text-center">
            <h1 class="text-4xl font-kanit font-semibold text-center text-gray-800 mb-8">Zerar Sorteio - Condomínio Alvorada</h1>
            <p class="text-gray-700 mb-6">Tem certeza que deseja zerar o sorteio? Esta ação não pode ser desfeita.</p>
            
            <form method="post" class="inline-block">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300 transform hover:scale-105">
                    Confirmar e Zerar
                </button>
            </form>
            
            <a href="{% url 'alvorada_sorteio' %}" class="inline-block ml-4 bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 transform hover:scale-105">
                Cancelar
            </a>
        </div>
    </div>
</div>
{% endblock %}
