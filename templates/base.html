{% load static %}
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        
        <!-- Minha CSS -->
        <link rel="stylesheet" href="{% static '/styles/style.css' %}">

        
        <!-- Fonte google -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <!-- Fonte do h1 -->
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,500;1,600&family=Montserrat&display=swap" rel="stylesheet">
        
        <!-- Logo e Título -->
        <link rel="shortcut icon" href="{% static '/assets/images/Logo 500x500.svg' %}" type="image/x-icon">
        <title>Sorteio Novo</title>
        
    </head>
    
    <body>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="/">Villa Nova Condomínios</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/alvorada-sorteio/">Alvorada</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/sky-view-sorteio/">Sky View</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/gran-vitta-sorteio/">Gran Vitta</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/passaros-sorteio/">Pássaros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/ventura-sorteio/">Ventura</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/arthur-sorteio/">Arthur</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/tres-coelhos-sorteio/">Três Coelhos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        {% block content %}{% endblock %}
        
        <!-- Footer -->
        <footer class="bg-light text-center text-lg-start mt-5">
            <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.05);">
                © 2024 Villa Nova Condomínios. Todos os direitos reservados.
            </div>
        </footer>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <!-- Javascript-->
        <script src="{% static '/js/app.js' %}"></script> 
    </body>
    
</html>
