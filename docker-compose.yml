version: "3.9"

services:
  web:
    # use tag imutável publicada no registry
    image: sorteio_novo-web:1.0.1
    env_file:
      - .env
    volumes:
      # ↔ STATIC_ROOT  →   /code/staticfiles
      - static_volume:/code/staticfiles
    networks:
      - LeituraSorteioNet

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=LeituraSorteioNet
        - traefik.http.routers.sorteio.rule=Host(`sn.sorteionovo.com.br`)
        - traefik.http.routers.sorteio.entrypoints=websecure
        - traefik.http.routers.sorteio.tls.certresolver=letsencryptresolver
        - traefik.http.services.sorteio.loadbalancer.server.port=8000

    command: >
      gunicorn setup.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3 --timeout 120

volumes:
  static_volume:

networks:
  LeituraSorteioNet:
    external: true
