version: '3.9'

services:
  web:
    build: .
    container_name: sorteio_django
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_volume:/code/static
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sorteio.rule=Host(`sn.sorteionovo.com.br`)"
      - "traefik.http.routers.sorteio.entrypoints=websecure"
      - "traefik.http.routers.sorteio.tls=true"
      - "traefik.http.routers.sorteio.tls.certresolver=letsencrypt"
      - "traefik.http.services.sorteio.loadbalancer.server.port=8000"

volumes:
  static_volume:

networks:
  traefik:
    external: true
